# bazzite-mx ships this sysusers.d entry because the `docker-ce`
# package from Docker Inc creates the docker group via an rpm
# postinstall scriptlet (`groupadd --system docker`) that is
# SUPPRESSED on rpm-ostree atomic images (rpm-ostree skips package
# scriptlets to keep the OCI layer reproducible).
#
# Without this file, the `docker` group is never created on the
# deployed system and our bazzite-mx-groups system-setup hook silently
# skips it ("WARNING: group docker not in /usr/lib/group; skipping",
# visible in the first-boot journal). Symptom for the user: every
# `docker run` requires sudo because the user is not in the docker
# group (because the group does not exist).
#
# `systemd-sysusers.service` runs at sysinit.target on every boot and
# ensures every entry in /usr/lib/sysusers.d/*.conf exists. Created
# with a system-range GID (the package convention).
#
# Type `g`, name `docker`, ID `-` (auto-assigned by systemd-sysusers
# in the system range, typically 100-999).
#
# Reference: systemd.sysusers(5).
g docker -
